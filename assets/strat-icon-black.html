<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1024px;
        height: 1024px;
        overflow: hidden;
        background: transparent; /* corners stay transparent for a native icns */
      }
      .stage {
        width: 1024px;
        height: 1024px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
      }
      /* Black rounded body with a small transparent margin and the macOS
         icon-grid corner radius. macOS shows icns literally (no auto-squircle),
         so the rounding is baked here. Black background, diamond enlarged,
         padding cut vs the old white-gradient recipe. */
      .body {
        width: 980px;
        height: 980px;
        border-radius: 220px;
        background: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 50% 44%,
          rgba(45, 178, 162, 0.20) 0%,
          rgba(45, 178, 162, 0) 60%
        );
      }
      /* Source is the layered-diamond render. The art is bottom-weighted (a
         yellow-green glow trails off the lowest layer toward the source's bottom
         edge), so we (a) keep it small enough that the whole mark clears the
         rounded body on every side and (b) nudge it UP so the bottom glow has
         room (no clipped "cut off" edge) and the teal core sits optically
         centered. */
      img {
        width: 800px;
        height: 800px;
        object-fit: contain;
        position: relative;
        z-index: 1;
        transform: translateY(-26px);
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="body"><img src="strat-icon-transparent-1024.png" alt="Strat" /></div>
    </div>
  </body>
</html>
