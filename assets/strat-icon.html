<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1024px;
        height: 1024px;
        overflow: hidden;
      }
      .icon {
        width: 1024px;
        height: 1024px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          circle at 32% 26%,
          #6ea0ff 0%,
          #3552b5 48%,
          #141d44 100%
        );
        position: relative;
      }
      .icon::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 70% 88%,
          rgba(255, 255, 255, 0.12) 0%,
          rgba(255, 255, 255, 0) 40%
        );
      }
      .mark {
        color: #fff;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
        font-size: 600px;
        font-weight: 800;
        letter-spacing: -36px;
        line-height: 1;
        text-shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="icon"><div class="mark">S</div></div>
  </body>
</html>
