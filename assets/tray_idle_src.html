<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; padding: 0; width: 64px; height: 64px; overflow: hidden; }
      svg { display: block; }
    </style>
  </head>
  <body>
    <!-- Stratos diamond OUTLINE for the macOS menu bar (idle state). White on
         transparent; the tray runs in template mode so macOS tints it (white on
         a dark menu bar, black on a light one). Wide-ish rhombus to match the
         Stratos mark; stroke kept chunky enough to read at ~22pt. -->
    <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <polygon points="32,14 58,32 32,50 6,32"
               fill="none" stroke="#ffffff" stroke-width="5" stroke-linejoin="round" />
    </svg>
  </body>
</html>
